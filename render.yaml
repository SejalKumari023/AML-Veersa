services:
  - type: web
    name: aml-veersa-b1
    runtime: docker
    dockerfilePath: ./backend_1/Dockerfile
    dockerContext: ./backend_1
    plan: free
    healthCheckPath: /health
    port: 5001
    envVars:
      - key: PORT
        value: 5001
      - key: HOST
        value: 0.0.0.0
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_DB
        value: postgres
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: RATE_LIMIT_PER_MIN
        value: "120"
      - key: NEO4J_URI
        value: ""
      - key: NEO4J_USER
        value: ""
      - key: NEO4J_PASSWORD
        value: ""
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_BASE
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile

  - type: web
    name: aml-veersa-b2
    runtime: docker
    dockerfilePath: ./backend_2/Dockerfile
    dockerContext: ./backend_2
    plan: free
    healthCheckPath: /health
    port: 5002
    envVars:
      - key: PORT
        value: 5002
      - key: HOST
        value: 0.0.0.0
      - key: DEBUG
        value: false
      - key: PYTHONUNBUFFERED
        value: 1
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_HOST
        sync: false
      - key: POSTGRES_PORT
        value: "5432"
      - key: POSTGRES_DB
        value: postgres
      - key: POSTGRES_USER
        value: postgres
      - key: POSTGRES_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: RATE_LIMIT_PER_MIN
        value: "120"
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_BASE
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GOOGLE_VISION_API_KEY
        sync: false
      - key: GOOGLE_CLOUD_VISION_ENABLED
        value: "true"
      - key: IMGUR_CLIENT_ID
        sync: false

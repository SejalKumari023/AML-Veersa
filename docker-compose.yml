services:
    nginx:
        build: ./nginx
        ports:
            - "80:80"
        depends_on:
            - frontend
            - backend_1
            - backend_2
        restart: always

    backend_1:
        build: ./backend_1
        expose:
            - "5001"
        ports:
            - "5001:5001"
        environment:
            - PORT=5001
            - HOST=0.0.0.0
            - DEBUG=false
            - POSTGRES_HOST=db
            - POSTGRES_PORT=5432
            - POSTGRES_DB=aml
            - POSTGRES_USER=aml
            - POSTGRES_PASSWORD=aml
            - NEO4J_URI=bolt://neo4j:7687
            - NEO4J_USER=neo4j
            - NEO4J_PASSWORD=aml_neo4j
            - GROQ_API_KEY=${GROQ_API_KEY}
            - GROQ_API_BASE=${GROQ_API_BASE}
        env_file:
            - .env
        depends_on:
            db:
                condition: service_started
            neo4j:
                condition: service_healthy
        restart: always

    backend_2:
        build: ./backend_2
        expose:
            - "5002"
        ports:
            - "5002:5002"
        environment:
            - PORT=5002
            - HOST=0.0.0.0
            - DEBUG=false
            - PYTHONUNBUFFERED=1
            - GROQ_API_KEY=${GROQ_API_KEY}
            - GROQ_API_BASE=${GROQ_API_BASE}
            - GOOGLE_CLOUD_VISION_ENABLED=${GOOGLE_CLOUD_VISION_ENABLED:-true}
            - GOOGLE_VISION_API_KEY=${GOOGLE_VISION_API_KEY}
        restart: always

    frontend:
        build: ./frontend
        expose:
            - "3000"
        ports:
            - "3000:3000"
        environment:
            - WATCHPACK_POLLING=true
            - WDS_SOCKET_PORT=0
            - NEXT_PUBLIC_API_URL=/api
            - NEXT_PUBLIC_API_URL_2=/llm-api
        volumes:
            - ./frontend:/app
            - /app/node_modules
            - /app/.next
        depends_on:
            - backend_1
            - backend_2
        restart: always
        extra_hosts:
            - "host.docker.internal:host-gateway"

    db:
        image: postgres:14.1-alpine
        restart: always
        environment:
            POSTGRES_DB: aml
            POSTGRES_USER: aml
            POSTGRES_PASSWORD: aml
        ports:
            - "5432:5432"
        volumes:
            - db_data:/var/lib/postgresql/data

    neo4j:
        image: neo4j:5.13-community
        restart: always
        environment:
            - NEO4J_AUTH=neo4j/aml_neo4j
            - NEO4J_PLUGINS=["apoc"]
            - NEO4J_dbms_security_procedures_unrestricted=apoc.*
            - NEO4J_dbms_memory_heap_max__size=2G
        ports:
            - "7474:7474" # HTTP
            - "7687:7687" # Bolt
        volumes:
            - neo4j_data:/data
            - neo4j_logs:/logs
        healthcheck:
            test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1" ]
            interval: 5s
            timeout: 3s
            retries: 10
            start_period: 20s

volumes:
    db_data:
    neo4j_data:
    neo4j_logs:
